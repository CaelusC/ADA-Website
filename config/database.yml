default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", nil) %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", nil) %>

development:
  <<: *default
  database: ada_website_development

test:
  <<: *default
  database: ada_website_test

production:
  primary: &primary_production
    <<: *default
    database: ada_website_production
    username: ada_website
    password: <%= ENV["ADA_WEBSITE_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: ada_website_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: ada_website_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: ada_website_production_cable
    migrations_paths: db/cable_migrate
